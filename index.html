<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game Card - Verso Atualizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">
        <div class="card" id="squidCard">
            <div class="card-face card-front">
                <svg width="280" height="120" viewBox="0 0 280 120" class="shapes-svg">
                    <g fill="none" stroke="#442200" stroke-width="6">
                        <circle cx="50" cy="60" r="40" />
                        <polygon points="140,20 180,100 100,100" transform="translate(0, 5)"/>
                        <rect x="200" y="20" width="75" height="75" rx="2" />
                    </g>
                </svg>
            </div>

            <div class="card-face card-back">
                <div class="back-content-centered">
                    <div class="icon-circle-filled">
                        <div class="house-shape"></div>
                    </div>
                    <span class="number">8650 4006</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
